name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish (for example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-ubuntu:
    name: build-ubuntu-x86_64
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: meta
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]]; then
            echo "invalid tag format: $tag"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++

      - name: Configure
        run: |
          cmake -S . -B build/release-ubuntu -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/build/install-ubuntu" \
            -DMUESLI_BT_BUILD_INTEGRATION_ROS2=OFF \
            -DMUESLI_BT_BUILD_INTEGRATION_PYBULLET=ON \
            -DMUESLI_BT_BUILD_INTEGRATION_WEBOTS=OFF \
            -DMUESLI_BT_BUILD_PYTHON_BRIDGE=OFF \
            -DMUESLI_BT_BUILD_WEBOTS_EXAMPLES=OFF

      - name: Build
        run: cmake --build build/release-ubuntu --parallel

      - name: Test
        run: ctest --test-dir build/release-ubuntu --output-on-failure --repeat until-pass:3

      - name: Install
        run: cmake --install build/release-ubuntu

      - name: Package
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"
          archive="muesli-bt-${tag}-ubuntu-x86_64.tar.gz"
          tar -C build/install-ubuntu -czf "$archive" .
          sha256sum "$archive" > "${archive}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-ubuntu-x86_64
          path: |
            muesli-bt-${{ steps.meta.outputs.tag }}-ubuntu-x86_64.tar.gz
            muesli-bt-${{ steps.meta.outputs.tag }}-ubuntu-x86_64.tar.gz.sha256
          if-no-files-found: error

  build-macos-arm64:
    name: build-macos-arm64
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: meta
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]]; then
            echo "invalid tag format: $tag"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Verify Apple Silicon runner
        run: |
          set -euo pipefail
          arch="$(uname -m)"
          if [ "$arch" != "arm64" ]; then
            echo "expected arm64 runner, got: $arch"
            exit 1
          fi

      - name: Install build dependencies
        run: |
          brew update
          brew install ninja

      - name: Configure
        run: |
          cmake -S . -B build/release-macos -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/build/install-macos" \
            -DMUESLI_BT_BUILD_INTEGRATION_ROS2=OFF \
            -DMUESLI_BT_BUILD_INTEGRATION_PYBULLET=ON \
            -DMUESLI_BT_BUILD_INTEGRATION_WEBOTS=OFF \
            -DMUESLI_BT_BUILD_PYTHON_BRIDGE=OFF \
            -DMUESLI_BT_BUILD_WEBOTS_EXAMPLES=OFF

      - name: Build
        run: cmake --build build/release-macos --parallel

      - name: Test
        run: ctest --test-dir build/release-macos --output-on-failure --repeat until-pass:3

      - name: Install
        run: cmake --install build/release-macos

      - name: Verify arm64 artifacts
        run: |
          set -euo pipefail
          test "$(uname -m)" = "arm64"
          file build/install-macos/bin/muslisp

      - name: Package
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"
          archive="muesli-bt-${tag}-macos-arm64.tar.gz"
          tar -C build/install-macos -czf "$archive" .
          shasum -a 256 "$archive" > "${archive}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64
          path: |
            muesli-bt-${{ steps.meta.outputs.tag }}-macos-arm64.tar.gz
            muesli-bt-${{ steps.meta.outputs.tag }}-macos-arm64.tar.gz.sha256
          if-no-files-found: error

  build-ubuntu-22.04-ros2-humble:
    name: build-ubuntu-22.04-ros2-humble-x86_64
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: meta
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]]; then
            echo "invalid tag format: $tag"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Install ROS 2 Humble and build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates cmake curl g++ gnupg lsb-release ninja-build software-properties-common
          sudo add-apt-repository universe
          curl -fsSL https://raw.githubusercontent.com/ros/rosdistro/master/ros.key \
            | sudo gpg --dearmor -o /usr/share/keyrings/ros-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/ros-archive-keyring.gpg] http://packages.ros.org/ros2/ubuntu $(. /etc/os-release && echo \"$UBUNTU_CODENAME\") main" \
            | sudo tee /etc/apt/sources.list.d/ros2.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y python3-colcon-common-extensions python3-rosdep python3-vcstool ros-dev-tools ros-humble-ros-base

      - name: Configure
        run: |
          source /opt/ros/humble/setup.bash
          cmake -S . -B build/release-ubuntu-ros2-humble -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/build/install-ubuntu-ros2-humble" \
            -DMUESLI_BT_BUILD_INTEGRATION_ROS2=ON \
            -DMUESLI_BT_BUILD_INTEGRATION_PYBULLET=OFF \
            -DMUESLI_BT_BUILD_INTEGRATION_WEBOTS=OFF \
            -DMUESLI_BT_BUILD_PYTHON_BRIDGE=OFF \
            -DMUESLI_BT_BUILD_WEBOTS_EXAMPLES=OFF

      - name: Build
        run: |
          source /opt/ros/humble/setup.bash
          cmake --build build/release-ubuntu-ros2-humble --parallel

      - name: Test
        run: |
          source /opt/ros/humble/setup.bash
          ctest --test-dir build/release-ubuntu-ros2-humble -R muslisp_tests --output-on-failure --repeat until-pass:2
          ctest --test-dir build/release-ubuntu-ros2-humble -R muesli_bt_conformance_tests --output-on-failure --repeat until-pass:2
          ctest --test-dir build/release-ubuntu-ros2-humble -R muesli_bt_conformance_l2_rosbag_tests --output-on-failure --repeat until-pass:2

      - name: Verify ROS2 L2 artefacts
        run: |
          python3 tools/verify_ros2_l2_artifacts.py \
            --artifact-root build/release-ubuntu-ros2-humble/ros2_l2_artifacts

      - name: Install
        run: |
          source /opt/ros/humble/setup.bash
          cmake --install build/release-ubuntu-ros2-humble

      - name: Verify installed ROS2 package artefacts
        run: |
          test -f build/install-ubuntu-ros2-humble/lib/cmake/muesli_bt/muesli_btConfig.cmake
          test -f build/install-ubuntu-ros2-humble/lib/cmake/muesli_bt/muesli_btTargets.cmake
          test -f build/install-ubuntu-ros2-humble/include/ros2/extension.hpp
          test -f build/install-ubuntu-ros2-humble/lib/libmuesli_bt_integration_ros2.a
          test -f build/install-ubuntu-ros2-humble/bin/muslisp_ros2
          grep -q "muesli_bt::integration_ros2" build/install-ubuntu-ros2-humble/lib/cmake/muesli_bt/muesli_btTargets.cmake

      - name: Configure and build ROS2 consumer smoketest
        run: |
          source /opt/ros/humble/setup.bash
          cmake -S tools/consumer_smoketest -B build/consumer-smoketest-ros2-release -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${GITHUB_WORKSPACE}/build/install-ubuntu-ros2-humble"
          cmake --build build/consumer-smoketest-ros2-release --parallel

      - name: Run ROS2 consumer smoketest
        run: |
          source /opt/ros/humble/setup.bash
          ./build/consumer-smoketest-ros2-release/mbt_inspector_ros2_smoketest

      - name: Package
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"
          archive="muesli-bt-${tag}-ubuntu-22.04-ros2-humble-x86_64.tar.gz"
          tar -C build/install-ubuntu-ros2-humble -czf "$archive" .
          sha256sum "$archive" > "${archive}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-ubuntu-22.04-ros2-humble-x86_64
          path: |
            muesli-bt-${{ steps.meta.outputs.tag }}-ubuntu-22.04-ros2-humble-x86_64.tar.gz
            muesli-bt-${{ steps.meta.outputs.tag }}-ubuntu-22.04-ros2-humble-x86_64.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: publish-github-release
    runs-on: ubuntu-latest
    needs:
      - build-ubuntu
      - build-macos-arm64
      - build-ubuntu-22.04-ros2-humble

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: meta
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          git fetch --tags --force
          git rev-parse "refs/tags/${tag}" >/dev/null
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create combined checksums
        run: |
          set -euo pipefail
          cat dist/*.sha256 > dist/SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          append_body: true
          body: |
            Binary artefacts are attached for:
            - Ubuntu x86_64 (generic, non-ROS)
            - Ubuntu 22.04 x86_64 with ROS 2 Humble support
            - macOS arm64 (Apple Silicon only)

            The ROS-enabled Ubuntu artefact requires a matching ROS 2 Humble runtime on the target host.

            GitHub auto-attaches source code archives (`.zip` and `.tar.gz`) for this tag.
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/SHA256SUMS.txt
