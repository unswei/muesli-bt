name: Linux CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract-change-guard:
    name: contract-change-guard
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require changelog update when contract changes
        run: |
          set -euo pipefail
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          changed_files="$(git diff --name-only "$base_sha" "$head_sha")"

          if echo "$changed_files" | grep -q '^docs/contracts/muesli-studio-integration.md$'; then
            if ! echo "$changed_files" | grep -q '^CHANGELOG.md$'; then
              echo "docs/contracts/muesli-studio-integration.md changed without CHANGELOG.md update."
              echo "Update CHANGELOG.md in the same PR when changing the integration contract."
              exit 1
            fi
          fi

  diagram-drift:
    name: diagram-drift
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Check diagram semantic drift
        run: python3 ./scripts/check_diagram_semantic_drift.py

  python-env:
    name: python-env
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Validate unified Python environment
        run: |
          bash ./scripts/setup-python-env.sh .venv-py311
          .venv-py311/bin/python -c "import pybullet, mkdocs; print('python env ok')"

  docs-strict:
    name: docs-strict
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Build docs in strict mode
        run: |
          bash ./scripts/setup-python-env.sh .venv-py311
          .venv-py311/bin/python -m mkdocs build --strict

  schema-validation:
    name: schema-validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install schema validation dependency
        run: python -m pip install jsonschema

      - name: Validate event schema and fixtures
        run: |
          python tools/validate_event_log.py \
            --schema schema/mbt.evt.v1.schema.json \
            tests/fixtures/mbt.evt.v1/*.jsonl

  fixture-drift:
    name: fixture-drift
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install compiler toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Regenerate deterministic event fixtures
        run: |
          mkdir -p build/tools
          c++ -std=c++20 -O2 tools/gen_fixtures_event_log.cpp -o build/tools/gen_fixtures_event_log
          ./build/tools/gen_fixtures_event_log

      - name: Check fixture drift
        run: git diff --exit-code tests/fixtures/mbt.evt.v1

  api-consumer-smoketest:
    name: api-consumer-smoketest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++

      - name: Configure runtime install build
        run: |
          cmake -S . -B build/install-smoke -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/build/install-root" \
            -DMUESLI_BT_BUILD_INTEGRATION_PYBULLET=ON \
            -DMUESLI_BT_BUILD_PYTHON_BRIDGE=OFF \
            -DMUESLI_BT_BUILD_WEBOTS_EXAMPLES=OFF

      - name: Build and install runtime package
        run: |
          cmake --build build/install-smoke --parallel
          cmake --install build/install-smoke

      - name: Verify installed package artefacts
        run: |
          test -f build/install-root/lib/cmake/muesli_bt/muesli_btConfig.cmake
          test -f build/install-root/lib/cmake/muesli_bt/muesli_btTargets.cmake
          test -f build/install-root/include/muslisp/eval.hpp
          test -f build/install-root/include/pybullet/extension.hpp
          test -f build/install-root/include/pybullet/racecar_demo.hpp
          test -f build/install-root/lib/libmuesli_bt_integration_pybullet.a
          test -f build/install-root/share/muesli_bt/contracts/muesli-studio-integration.md
          test -f build/install-root/share/muesli_bt/schema/mbt.evt.v1.schema.json
          grep -q "set(muesli_bt_SHARE_DIR " build/install-root/lib/cmake/muesli_bt/muesli_btConfig.cmake
          if grep -q "muesli_bt::integration_webots" build/install-root/lib/cmake/muesli_bt/muesli_btTargets.cmake; then
            test -f build/install-root/include/webots/extension.hpp
          fi

      - name: Configure and build consumer smoketest
        run: |
          cmake -S tools/consumer_smoketest -B build/consumer-smoketest -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${GITHUB_WORKSPACE}/build/install-root"
          cmake --build build/consumer-smoketest --parallel

      - name: Run consumer smoketest
        run: |
          ./build/consumer-smoketest/mbt_inspector_smoketest
          if [ -x ./build/consumer-smoketest/mbt_inspector_webots_smoketest ]; then
            ./build/consumer-smoketest/mbt_inspector_webots_smoketest
          fi

  build-and-test:
    name: linux-${{ matrix.compiler }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang g++

      - name: Configure (Debug preset)
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake --preset dev

      - name: Build
        run: cmake --build --preset dev --parallel

      - name: Test
        run: ctest --preset dev

  core-sanitizers:
    name: core-sanitizer-${{ matrix.sanitizer }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - sanitizer: asan
            cxx_flags: "-fsanitize=address -fno-omit-frame-pointer"
          - sanitizer: ubsan
            cxx_flags: "-fsanitize=undefined -fno-omit-frame-pointer"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang

      - name: Configure core-only with sanitizer
        run: |
          cmake -S . -B build/sanitizer-${{ matrix.sanitizer }} -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_CXX_FLAGS="${{ matrix.cxx_flags }}" \
            -DMUESLI_BT_BUILD_INTEGRATION_PYBULLET=OFF \
            -DMUESLI_BT_BUILD_INTEGRATION_WEBOTS=OFF \
            -DMUESLI_BT_BUILD_PYTHON_BRIDGE=OFF \
            -DMUESLI_BT_BUILD_WEBOTS_EXAMPLES=OFF

      - name: Build
        run: cmake --build build/sanitizer-${{ matrix.sanitizer }} --parallel

      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=1:strict_init_order=1
          UBSAN_OPTIONS: print_stacktrace=1
        run: ctest --test-dir build/sanitizer-${{ matrix.sanitizer }} --output-on-failure

  macos-core:
    name: macos-core
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          brew update
          brew install ninja

      - name: Configure core-only build
        run: |
          cmake -S . -B build/macos-core -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DMUESLI_BT_BUILD_INTEGRATION_PYBULLET=OFF \
            -DMUESLI_BT_BUILD_INTEGRATION_WEBOTS=OFF \
            -DMUESLI_BT_BUILD_PYTHON_BRIDGE=OFF \
            -DMUESLI_BT_BUILD_WEBOTS_EXAMPLES=OFF

      - name: Build
        run: cmake --build build/macos-core --parallel

      - name: Test
        run: ctest --test-dir build/macos-core --output-on-failure

  macos-webots-consumer-smoketest:
    name: macos-webots-consumer-smoketest
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          brew update
          brew install ninja
          brew install --cask webots

      - name: Discover Webots home
        run: |
          set -euo pipefail
          if [ -d /Applications/Webots.app/Contents/lib/controller ]; then
            echo "WEBOTS_HOME=/Applications/Webots.app" >> "$GITHUB_ENV"
            exit 0
          fi
          app_path="$(ls -d /Applications/Webots*.app 2>/dev/null | head -n 1 || true)"
          if [ -z "$app_path" ] || [ ! -d "$app_path/Contents/lib/controller" ]; then
            echo "Webots installation not found under /Applications"
            exit 1
          fi
          echo "WEBOTS_HOME=${app_path}" >> "$GITHUB_ENV"

      - name: Configure runtime install build (Webots enabled)
        run: |
          cmake -S . -B build/macos-webots-install -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/build/macos-webots-install-root" \
            -DMUESLI_BT_BUILD_INTEGRATION_PYBULLET=OFF \
            -DMUESLI_BT_BUILD_INTEGRATION_WEBOTS=ON \
            -DMUESLI_BT_BUILD_PYTHON_BRIDGE=OFF \
            -DMUESLI_BT_BUILD_WEBOTS_EXAMPLES=OFF

      - name: Build and install runtime package
        run: |
          cmake --build build/macos-webots-install --parallel
          cmake --install build/macos-webots-install

      - name: Verify installed Webots integration artefacts
        run: |
          test -f build/macos-webots-install-root/lib/cmake/muesli_bt/muesli_btConfig.cmake
          test -f build/macos-webots-install-root/lib/cmake/muesli_bt/muesli_btTargets.cmake
          grep -q "muesli_bt::integration_webots" build/macos-webots-install-root/lib/cmake/muesli_bt/muesli_btTargets.cmake
          test -f build/macos-webots-install-root/include/webots/extension.hpp

      - name: Configure and build consumer smoketest
        run: |
          cmake -S tools/consumer_smoketest -B build/macos-webots-consumer -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${GITHUB_WORKSPACE}/build/macos-webots-install-root"
          cmake --build build/macos-webots-consumer --parallel

      - name: Verify runtime rpath shape and process start
        run: |
          set -euo pipefail
          test -x ./build/macos-webots-consumer/mbt_inspector_webots_smoketest
          otool -l ./build/macos-webots-consumer/mbt_inspector_webots_smoketest > build/macos-webots-consumer/otool.txt
          if grep -A2 "LC_RPATH" build/macos-webots-consumer/otool.txt | grep -q "Contents/lib/controller$"; then
            echo "invalid LC_RPATH points at Contents/lib/controller instead of Webots root"
            exit 1
          fi
          WEBOTS_HOME="${WEBOTS_HOME}" ./build/macos-webots-consumer/mbt_inspector_webots_smoketest
