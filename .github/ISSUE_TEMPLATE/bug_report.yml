name: Bug report
description: Report a reproducible problem in released or documented behaviour.
title: "[bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include exact commands, inputs, and artefact paths.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: "v0.6.0 or git SHA"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, compiler, CMake preset, Python version, ROS2 distro if relevant.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or traces
      description: Link or paste relevant canonical event-log, validation, or test output.
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I checked whether this is documented as a known limitation or planned feature.
        - label: I can reproduce this from a clean checkout or clean build directory.
